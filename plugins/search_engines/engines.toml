# Edit this file to add or remove search engines.
# Each engine registers its own launcher prefix.
# Available URL placeholders:
#   {query}      URL-encoded with urllib.parse.quote
#   {query_plus} URL-encoded with urllib.parse.quote_plus
#   {raw}        Unescaped raw query text
# Optional icon field:
#   icon_url

[[engines]]
id = "google"
name = "Google"
prefix = "g"
url = "https://www.google.com/search?q={query}"
homepage = "https://www.google.com"
subtitle = "General web search"
badge = "G"
icon_url = "https://www.google.com/favicon.ico"

[[engines]]
id = "github"
name = "GitHub"
prefix = "gh"
url = "https://github.com/search?q={query}&type=repositories"
homepage = "https://github.com"
subtitle = "Repository and code search"
badge = "GH"
icon_url = "https://github.com/favicon.ico"

[[engines]]
id = "x"
name = "X"
prefix = "x"
url = "https://x.com/search?q={query}&src=typed_query"
homepage = "https://x.com"
subtitle = "Search posts and profiles"
badge = "X"
icon_url = "https://x.com/favicon.ico"

[[engines]]
id = "etherscan"
name = "Etherscan"
prefix = "eth"
url = "https://etherscan.io/search?f=0&q={query}"
homepage = "https://etherscan.io"
subtitle = "Address, token, and transaction lookup"
badge = "ETH"
icon_url = "https://etherscan.io/favicon.ico"
